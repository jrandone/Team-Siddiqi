<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thank you — TSE</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="pages/shared.css" />
</head>
<body class="centered">
  <div class="card">
    <div class="check-circle">✓</div>
    <h1 class="serif">Thank you.</h1>
    <p class="muted" id="successCopy">Your order is in. A confirmation and tracking details are on their way to your inbox.</p>
    <div class="divider"></div>
    <p class="small muted">Reference: <span id="ref">—</span></p>
    <p class="small muted">Questions? Reach us through our <a href="/pages/contact.html">contact form</a>.</p>
    <a class="btn" href="/">Continue →</a>
  </div>

<script>
  const params = new URLSearchParams(location.search);
  const type = params.get('type') || 'order';
  const sessionId = params.get('session_id') || '';
  document.getElementById('ref').textContent = sessionId.slice(-12) || 'n/a';
  if (type === 'donation') {
    document.querySelector('h1').textContent = 'Thank you for your gift.';
    document.getElementById('successCopy').textContent = '100% of your gift goes to the cause. A receipt is on its way to your inbox.';
  }
</script>
</body>
</html>
